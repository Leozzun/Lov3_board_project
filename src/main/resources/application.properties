spring.application.name=lov3_board_project

# ===== 서버 포트 =====
server.port=8087

# ===== 활성 프로파일 (dev / prod 중 선택) =====
spring.profiles.active=dev

# ===== JWT 설정 =====
# 실제 운영에서는 환경변수로 주입: ${SPRING_JWT_SECRET}
spring.jwt.secret=LOV3-BOARD-JWT-SECRET-KEY-MUST-BE-AT-LEAST-32-CHARS

# ===== JPA 공통 설정 =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=mysql
