# ===== 개발환경 DB 설정 =====
# 로컬 MySQL에 board_db 데이터베이스를 미리 만들어두세요
# CREATE DATABASE board_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/board_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234

# ===== 테이블 자동 생성 (개발용) =====
# create       : 앱 실행 시 테이블 삭제 후 재생성 (데이터 날아감!)
# create-drop  : 앱 종료 시 테이블 삭제
# update       : 변경사항만 반영 (데이터 유지)
# validate     : 엔티티와 테이블 일치 여부 확인만
# none         : 아무것도 안 함
spring.jpa.hibernate.ddl-auto=update
